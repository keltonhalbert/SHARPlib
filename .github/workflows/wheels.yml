name: Build Wheels
on:
  workflow_dispatch:
    inputs:
      post_release_version:
        description: 'Manually specify a version.'
        required: true
  pull_request:
    branches: ["main", "develop"]
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  validate_input:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate version input
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.?(a|b|rc|dev|post)[0-9]+)*$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
        env:
          VERSION: ${{ inputs.post_release_version }}
  build_wheels:
    name: Build wheels for ${{ matrix.os }}
    needs: [validate_input]
    if: always() && (needs.validate_input.result == 'success' || needs.validate_input.result == 'skipped')
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        os: [ linux-intel, linux-arm, windows, macos-intel, macos-arm ]
        include:
          - archs: auto
            platform: auto
          - os: linux-intel
            runs-on: ubuntu-latest
          - os: linux-arm
            runs-on: ubuntu-24.04-arm
          - os: windows
            runs-on: windows-latest
          - os: macos-intel
            runs-on: macos-15-intel
          - os: macos-arm
            runs-on: macos-latest
            archs: auto,universal2

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: 'true'
          fetch-tags: 'true'
          fetch-depth: 0
          
      - name: Change submodule URLs to HTTPS 
        run: |
          git submodule foreach '
            git config submodule.$name.url https://github.com/$urlPath
          '
      - name: Submodules and Dependencies
        run: |
          git config --global --add safe.directory ${{ github.workspace }} 
          git submodule update --init --recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # 3.4.0
        env:
          CIBW_PLATFORM: ${{ matrix.platform }}
          CIBW_ARCHS: ${{ matrix.archs }}
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.post_release_version }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # 4.1.0
        with: 
          subject-path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    needs: [validate_input]
    if: always() && (needs.validate_input.result == 'success' || needs.validate_input.result == 'skipped')
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: 'true'
          fetch-tags: 'true'
          fetch-depth: 0

      - name: Change submodule URLs to HTTPS 
        run: |
          git submodule foreach '
            git config submodule.$name.url https://github.com/$urlPath
          '
      - name: Submodules and Dependencies
        run: |
          git config --global --add safe.directory ${{ github.workspace }} 
          git submodule update --init --recursive

      - name: Build sdist
        run: pipx run build --sdist
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.post_release_version }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # 4.1.0
        with: 
          subject-path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: 
      name: pypi
      url: https://pypi.org/p/SHARPlib
    permissions:
      id-token: write
    if: >-
      always() &&
      needs.build_wheels.result == 'success' &&
      needs.build_sdist.result == 'success' &&
      ((github.event_name == 'release' && github.event.action == 'published') ||
      github.event_name == 'workflow_dispatch')
    # or, alternatively, upload to PyPI on every tag starting with 'v' (remove on: release above to use this)
    # if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # 1.13.0
